<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsDesk — Portal Berita Terkini</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#0f0e0c; --ink-soft:#3a3730; --ink-muted:#7a776e; --paper:#f7f4ee; --paper-alt:#edeae2; --cream:#faf8f3; --accent:#c8540e; --accent-light:#f0e8df; --border:#ddd9ce; --radius:8px; }
html { scroll-behavior: smooth; }
body { font-family:'DM Sans',sans-serif; color:var(--ink); background-color:var(--paper); background-attachment:fixed; min-height:100vh; }
a { text-decoration:none; color:inherit; }

/* LOADING */
#loading-screen { position:fixed; inset:0; background:var(--paper); z-index:10000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* HEADER */
.site-header { width:100%; height:300px; background-color:var(--ink); background-size:cover; background-position:center; position:relative; display:none; }
.header-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.7)); }
.header-content { position:relative; z-index:2; height:100%; max-width:1200px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:40px; color:#fff; }
.header-logo { font-family:'Playfair Display',serif; font-size:32px; font-weight:800; margin-bottom:8px; }
.header-logo span { color:var(--accent); }
.header-tagline { font-size:14px; opacity:.8; }

/* LAYOUT */
.main-wrapper { max-width:1200px; margin:0 auto; padding:32px 24px; display:grid; grid-template-columns:1fr 320px; gap:40px; }

/* KONTEN UTAMA */
.section-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:800; margin-bottom:24px; padding-bottom:12px; border-bottom:2px solid var(--ink); display:flex; align-items:center; gap:12px; }
.section-title span { color:var(--accent); font-size:14px; font-family:'DM Sans',sans-serif; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.news-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:24px; margin-bottom:48px; }
.news-card { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.05); cursor:pointer; transition:transform .2s, box-shadow .2s; border:1px solid var(--border); }
.news-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
.news-img { width:100%; height:180px; background-color:var(--paper-alt); background-size:cover; background-position:center; }
.news-content { padding:20px; }
.news-cat { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block; }
.news-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:800; line-height:1.3; margin-bottom:10px; color:var(--ink); }
.news-excerpt { font-size:13px; color:var(--ink-muted); line-height:1.5; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.news-date { font-size:12px; color:var(--ink-soft); font-family:'DM Mono',monospace; }

/* DETAIL BERITA */
.detail-container { max-width:800px; }
.back-link { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--accent); margin-bottom:24px; }
.back-link:hover { text-decoration:underline; }
.detail-cat { font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; display:block; }
.detail-title { font-family:'Playfair Display',serif; font-size:42px; font-weight:800; line-height:1.15; margin-bottom:20px; }
.detail-meta { display:flex; gap:20px; padding:16px 0; border-top:2px solid var(--ink); border-bottom:1px solid var(--border); margin-bottom:32px; font-size:14px; color:var(--ink-muted); }
.detail-img { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:var(--radius); margin-bottom:32px; background:var(--paper-alt); }
.detail-body { font-size:17px; line-height:1.9; color:var(--ink-soft); word-break:break-word; }
.detail-body a { color:var(--accent); text-decoration:underline; }
.detail-body p { margin-bottom:16px; }
.not-found { text-align:center; padding:80px 20px; }
.not-found h2 { font-family:'Playfair Display',serif; font-size:32px; margin-bottom:12px; }

/* SIDEBAR */
.sidebar { position:sticky; top:20px; height:fit-content; }
.sidebar-widget { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:24px; }
.sidebar-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid var(--accent); }
.sidebar-list { max-height:500px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
/* Custom Scrollbar Sidebar */
.sidebar-list::-webkit-scrollbar { width:4px; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.sidebar-item { display:flex; gap:12px; cursor:pointer; }
.sidebar-item-img { width:70px; height:70px; flex-shrink:0; background-color:var(--paper-alt); background-size:cover; background-position:center; border-radius:6px; }
.sidebar-item-info h4 { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.sidebar-item-info h4:hover { color:var(--accent); }
.sidebar-item-info span { font-size:11px; color:var(--ink-muted); font-family:'DM Mono',monospace; }

@media(max-width:900px) { .main-wrapper { grid-template-columns:1fr; } .sidebar { position:static; order:-1; } .news-grid { grid-template-columns:1fr; } .detail-title { font-size:28px; } .site-header { height:200px; } }
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><div style="font-size:13px;color:var(--ink-muted)">Memuat Berita Terkini...</div></div>

<header class="site-header" id="site-header">
  <div class="header-overlay"></div>
  <div class="header-content">
    <div class="header-logo">News<span>Desk</span></div>
    <div class="header-tagline">Portal Berita Terpercaya & Terkini</div>
  </div>
</header>

<div class="main-wrapper">
  <main id="main-content">
    <!-- Akan diisi oleh JavaScript (Home atau Detail) -->
  </main>
  
  <aside class="sidebar">
    <div class="sidebar-widget">
      <div class="sidebar-title">Berita Terbaru</div>
      <div class="sidebar-list" id="sidebar-list">
        <!-- Diisi daftar berita terbaru -->
      </div>
    </div>
    <div class="sidebar-widget" id="sidebar-custom" style="display:none">
      <!-- Diisi Custom HTML dari Admin -->
    </div>
  </aside>
</div>

<script>
  const BIN_ID = '6a1cb36e21f9ee59d2a28892';
  const API_KEY = '$2a$10$Y9jMSi6.HLxKlIkl9y6Lg.LiOcTJgXQo83Zs./WzJpHhEz2SD4cru';
  const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
  
  let dbData = { articles: [], settings: {} };
  let articles = [];

  function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function formatDate(d) { if(!d) return '-'; try { return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; }}
  function formatDateFull(d) { if(!d) return '-'; try { return new Date(d).toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e) { return d; }}

  // ROUTING SEDERHANA
  function route() {
    const hash = window.location.hash;
    if (hash.startsWith('#/berita/')) {
      const slug = hash.replace('#/berita/', '');
      showDetail(slug);
    } else {
      showHome();
    }
  }
  window.addEventListener('hashchange', route);

  function showHome() {
    // Hanya ambil yang statusnya PUBLISHED
    const published = articles.filter(a => a.status === 'published');
    
    // Kelompokkan berdasarkan Kategori
    const categories = [...new Set(published.map(a => a.category))];
    
    if(published.length === 0) {
      document.getElementById('main-content').innerHTML = '<div class="not-found"><h2>Belum Ada Berita</h2><p>Silakan cek kembali beberapa saat lagi.</p></div>';
      return;
    }

    let html = '';
    categories.forEach(cat => {
      const catArticles = published.filter(a => a.category === cat);
      html += `
        <section>
          <div class="section-title">${cat} <span>${catArticles.length} Artikel</span></div>
          <div class="news-grid">
            ${catArticles.map(a => `
              <a href="#/berita/${a.slug}" class="news-card">
                <div class="news-img" style="background-image:url(${a.image || ''})"></div>
                <div class="news-content">
                  <span class="news-cat">${esc(a.category)}</span>
                  <h3 class="news-title">${esc(a.title)}</h3>
                  <p class="news-excerpt">${esc(a.excerpt || a.body.replace(/<[^>]*>?/gm, '').substring(0, 120))}</p>
                  <span class="news-date">${formatDate(a.date)}</span>
                </div>
              </a>
            `).join('')}
          </div>
        </section>
      `;
    });
    document.getElementById('main-content').innerHTML = html;
    window.scrollTo(0, 0);
  }

  function showDetail(slug) {
    const article = articles.find(a => a.slug === slug && a.status === 'published');
    
    if(!article) {
      document.getElementById('main-content').innerHTML = '<div class="not-found"><h2>404 Tidak Ditemukan</h2><p>Berita yang kamu cari tidak ada atau sudah dihapus.</p><br><a href="#" class="back-link">&#8592; Kembali ke Beranda</a></div>';
      return;
    }

    let html = `
      <div class="detail-container">
        <a href="#" class="back-link" onclick="history.back(); return false;">&#8592; Kembali ke Beranda</a>
        <span class="detail-cat">${esc(article.category)}</span>
        <h1 class="detail-title">${esc(article.title)}</h1>
        <div class="detail-meta">
          <span>Oleh: <strong>${esc(article.author)}</strong></span>
          <span>${formatDateFull(article.date)}</span>
        </div>
        ${article.image ? `<img src="${article.image}" class="detail-img" onerror="this.style.display='none'">` : ''}
        <div class="detail-body">${article.body}</div>
      </div>
    `;
    document.getElementById('main-content').innerHTML = html;
    window.scrollTo(0, 0);
  }

  function renderSidebar() {
    const published = articles.filter(a => a.status === 'published').slice(0, 15); // Ambil 15 terbaru
    const listEl = document.getElementById('sidebar-list');
    
    if(published.length === 0) {
      listEl.innerHTML = '<p style="font-size:13px;color:var(--ink-muted);text-align:center;">Belum ada berita.</p>';
    } else {
      listEl.innerHTML = published.map(a => `
        <a href="#/berita/${a.slug}" class="sidebar-item">
          <div class="sidebar-item-img" style="background-image:url(${a.image || ''})"></div>
          <div class="sidebar-item-info">
            <h4>${esc(a.title)}</h4>
            <span>${formatDate(a.date)}</span>
          </div>
        </a>
      `).join('');
    }

    // Render Custom HTML
    const customEl = document.getElementById('sidebar-custom');
    if(dbData.settings.sidebarHtml) {
      customEl.innerHTML = dbData.settings.sidebarHtml;
      customEl.style.display = 'block';
    }
  }

  function applySettings() {
    const s = dbData.settings || {};
    const body = document.body;
    
    // Background Logic
    if(s.bgImage) {
      body.style.backgroundColor = '#000'; // Fallback
      body.style.backgroundImage = `url(${s.bgImage})`;
      body.style.backgroundSize = 'cover';
      body.style.backgroundPosition = 'center';
      body.style.backgroundAttachment = 'fixed';
    } else {
      body.style.backgroundImage = 'none';
      body.style.backgroundColor = s.bgColor || '#f7f4ee';
    }

    // Header Logic
    const header = document.getElementById('site-header');
    if(s.headerImage) {
      header.style.backgroundImage = `url(${s.headerImage})`;
      header.style.display = 'block';
    } else {
      header.style.display = 'none';
    }
  }

  // INIT APP
  (async function init() {
    try {
      const res = await fetch(`${API_URL}/latest`, { headers: { 'X-Master-Key': API_KEY } });
      const data = await res.json();
      if (Array.isArray(data.record)) { dbData.articles = data.record; } 
      else { dbData = { ...dbData, ...data.record }; }
      articles = dbData.articles || [];
      dbData.settings = dbData.settings || {};
    } catch (e) {
      document.getElementById('main-content').innerHTML = '<div class="not-found"><h2>Koneksi Gagal</h2><p>Tidak dapat memuat data dari server.</p></div>';
    }
    
    applySettings();
    renderSidebar();
    route(); // Jalankan routing
    
    document.getElementById('loading-screen').style.display = 'none';
  })();
</script>
</body>
</html>

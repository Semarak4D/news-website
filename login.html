<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — KAJIAN4D</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#0f0e0c; --ink-soft:#3a3730; --paper:#f7f4ee; --accent:#c8540e; --border:#ddd9ce; --radius:8px; }
body { height:100vh; background:var(--ink); font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; }
.login-card { background:var(--paper); padding:48px 40px; border-radius:12px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
.logo-area { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.logo-area img { height:36px; }
.logo-text { font-family:'Playfair Display',serif; font-size:24px; font-weight:800; color:var(--ink); }
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.form-input { width:100%; padding:12px 16px; background:#fff; border:1.5px solid var(--border); border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition:.2s; }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,84,14,.1); }
.btn { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600; cursor:pointer; transition:.2s; margin-top:8px; }
.btn:hover { background:#a8430c; }
.error-msg { color:#b5271f; font-size:13px; text-align:center; margin-top:16px; display:none; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo-area">
    <img src="https://ik.imagekit.io/ehc8d8fve/icon-kajian4d.png" alt="Logo">
    <div class="logo-text">KAJIAN4D</div>
  </div>
  
  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="form-group">
      <label class="form-label">ID User</label>
      <input type="text" class="form-input" id="userID" placeholder="Masukkan ID User" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="userPass" placeholder="Masukkan Password" required>
    </div>
    <button type="submit" class="btn">MASUK KE PANEL</button>
    <div class="error-msg" id="errorMsg">ID User atau Password salah!</div>
  </form>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  const id = document.getElementById('userID').value.trim();
  const pass = document.getElementById('userPass').value;
  
  // Kredensial yang diizinkan
  if(id === 'Kajian4D-admin' && pass === 'Bos210514.') {
    // Simpan status login di sessionStorage (akan hilang jika tab ditutup)
    sessionStorage.setItem('kajian4d_auth', 'true');
    // Arahkan ke admin
    window.location.href = '/admin';
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
  return false;
}
</script>
</body>
</html>
